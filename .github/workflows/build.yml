name: Build Flipper ESP32 Variants

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.board.name }}
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        board:
          - name: generic_esp32s3
            target: esp32s3
            build_dir: build_generic
            flipper_board: generic_esp32s3
            artifact_name: flipper-esp32s3-generic

          - name: lilygo_t_embed_cc1101
            target: esp32s3
            build_dir: build_t_embed
            flipper_board: lilygo_t_embed_cc1101
            artifact_name: flipper-lilygo-t-embed-cc1101

          - name: waveshare_c6_1.9
            target: esp32c6
            build_dir: build_waveshare_c6
            flipper_board: waveshare_c6_1.9
            artifact_name: flipper-waveshare-c6-1.9

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: ${{ matrix.board.target }}

      - name: Build ${{ matrix.board.name }}
        shell: bash
        run: |
          source $IDF_PATH/export.sh

          echo "Building ${{ matrix.board.name }} (Target: ${{ matrix.board.target }})"

          # Important: Delete old sdkconfig to avoid target mismatch
          rm -f sdkconfig
          rm -rf ${{ matrix.board.build_dir }}

          # Set target and build
          idf.py -B ${{ matrix.board.build_dir }} \
            set-target ${{ matrix.board.target }}

          idf.py -B ${{ matrix.board.build_dir }} \
            -DFLIPPER_BOARD=${{ matrix.board.flipper_board }} \
            reconfigure build

          ls -lh ${{ matrix.board.build_dir }}/*.bin || echo "No .bin files found"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          BUILD_DIR="${{ matrix.board.build_dir }}"

          cp ${BUILD_DIR}/*.bin artifacts/ 2>/dev/null || true
          cp ${BUILD_DIR}/bootloader/bootloader.bin artifacts/ 2>/dev/null || true
          cp ${BUILD_DIR}/partition_table/partition-table.bin artifacts/ 2>/dev/null || true

          if [ -f ${BUILD_DIR}/furi_esp32.bin ]; then
            cp ${BUILD_DIR}/furi_esp32.bin artifacts/${{ matrix.board.artifact_name }}.bin
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board.artifact_name }}
          path: artifacts/
          retention-days: 30
